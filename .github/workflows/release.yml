name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: codescope-x86_64-unknown-linux-gnu.tar.gz
            bin: codescope
          - os: macos-15
            target: x86_64-apple-darwin
            archive: codescope-x86_64-apple-darwin.tar.gz
            bin: codescope
          - os: macos-15
            target: aarch64-apple-darwin
            archive: codescope-aarch64-apple-darwin.tar.gz
            bin: codescope
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: codescope-x86_64-pc-windows-msvc.zip
            bin: codescope.exe
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} dist/
          cp README.md LICENSE-MIT LICENSE-APACHE dist/
          tar -czf ${{ matrix.archive }} -C dist .
      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target\${{ matrix.target }}\release\${{ matrix.bin }} dist\
          Copy-Item README.md,LICENSE-MIT,LICENSE-APACHE dist\
          Compress-Archive -Path dist\* -DestinationPath ${{ matrix.archive }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  checksums:
    name: Generate Checksums
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        shell: bash
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS
      - uses: actions/upload-artifact@v7
        with:
          name: SHA256SUMS
          path: artifacts/SHA256SUMS

  publish:
    name: Publish GitHub Release
    needs: checksums
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
